name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          [ -z "$out" ] || { echo "gofmt needed on:"; echo "$out"; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Built from source with the job's Go so the linter never lags the toolchain.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run
      - name: test + coverage floor
        run: ./scripts/cover-check.sh 80
      - name: build
        run: go build ./...
