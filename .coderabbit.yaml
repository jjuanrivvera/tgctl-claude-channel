# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit config — jjuanrivvera Go CLI (cliwright standard).
# make verify is the hard gate; CodeRabbit is the second opinion (design, readability, edge cases).
reviews:
  profile: chill
  poem: false
  sequence_diagrams: false
  auto_review:
    ignore_title_keywords: ["WIP", "release:", "build(deps)"]   # skip dependabot + release bumps
  path_filters:
    # docs/commands/*.md is generated by `make docs-gen` and verified by CI — a global-flag change
    # rewrites every command's doc, which alone can push a PR past CodeRabbit's per-PR file limit and
    # skip the whole review. Exclude generated output so the actual code still gets reviewed.
    - "!docs/**"
    - "!**/testdata/**"
    - "!**/*.golden"
  path_instructions:
    - path: "**/*.go"
      instructions: |
        Follow AGENTS.md. Comments explain WHY, not WHAT. Thread cmd.Context() (never context.Background()).
        Secrets only in the OS keyring, never in code/logs/commits. Parameterized SQL only.
        Flag any new panic, unchecked error, or goroutine leak.
    - path: "**/*_test.go"
      instructions: |
        Prefer table-driven tests with t.Context(). Cover error paths and edge cases, not just the happy path.
knowledge_base:
  code_guidelines:
    enabled: true   # read AGENTS.md / CONTRIBUTING.md as review guidance
