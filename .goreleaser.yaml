version: 2
project_name: tgctl-claude-channel

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: jjuanrivvera
    name: tgctl-claude-channel
  footer: |
    ---
    Built with [GoReleaser](https://goreleaser.com). See [CHANGELOG.md](https://github.com/jjuanrivvera/tgctl-claude-channel/blob/main/CHANGELOG.md).
